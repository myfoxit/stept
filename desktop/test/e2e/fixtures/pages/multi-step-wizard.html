<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Wizard - Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .wizard { background: #fff; border-radius: 12px; padding: 32px; width: 440px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .progress { display: flex; gap: 8px; margin-bottom: 24px; }
    .progress-dot { width: 32px; height: 4px; border-radius: 2px; background: #e8e8f0; }
    .progress-dot.active { background: #3ab08a; }
    .progress-dot.done { background: #1a7a5a; }
    .step { display: none; }
    .step.active { display: block; }
    h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 6px; }
    .step-desc { font-size: 14px; color: #6e6e82; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d4d4de; border-radius: 8px;
      font-size: 14px; outline: none; margin-bottom: 16px; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: #3ab08a; }
    textarea { resize: vertical; min-height: 80px; }
    .radio-group { margin-bottom: 16px; }
    .radio-option { display: flex; align-items: center; gap: 8px; padding: 8px 0; cursor: pointer; }
    .radio-option input { width: 16px; height: 16px; }
    .btn-row { display: flex; justify-content: space-between; margin-top: 20px; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .btn-back { background: #e8e8f0; color: #1a1a2e; }
    .btn-next { background: #3ab08a; color: #fff; }
    .btn-next:hover { background: #2f9a78; }
    .btn-back:hover { background: #d4d4de; }
    .completion { text-align: center; padding: 32px 0; }
    .completion .check { font-size: 48px; margin-bottom: 12px; }
    .completion h2 { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="wizard">
    <div class="progress" id="progress">
      <div class="progress-dot active" data-step="0"></div>
      <div class="progress-dot" data-step="1"></div>
      <div class="progress-dot" data-step="2"></div>
      <div class="progress-dot" data-step="3"></div>
    </div>

    <!-- Step 1: Personal Info -->
    <div class="step active" id="step0">
      <h2>Personal Info</h2>
      <p class="step-desc">Tell us about yourself</p>
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" placeholder="John Doe" autocomplete="off">
      <label for="emailAddr">Email</label>
      <input type="email" id="emailAddr" placeholder="john@example.com" autocomplete="off">
      <div class="btn-row">
        <div></div>
        <button class="btn btn-next" onclick="goToStep(1)">Next</button>
      </div>
    </div>

    <!-- Step 2: Preferences -->
    <div class="step" id="step1">
      <h2>Preferences</h2>
      <p class="step-desc">Customize your experience</p>
      <label>Notification frequency</label>
      <div class="radio-group">
        <label class="radio-option"><input type="radio" name="notif" value="realtime"> Real-time</label>
        <label class="radio-option"><input type="radio" name="notif" value="daily"> Daily digest</label>
        <label class="radio-option"><input type="radio" name="notif" value="weekly"> Weekly summary</label>
      </div>
      <label for="language">Language</label>
      <select id="language">
        <option value="">Select language...</option>
        <option value="en">English</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>
      <div class="btn-row">
        <button class="btn btn-back" onclick="goToStep(0)">Back</button>
        <button class="btn btn-next" onclick="goToStep(2)">Next</button>
      </div>
    </div>

    <!-- Step 3: Bio -->
    <div class="step" id="step2">
      <h2>About You</h2>
      <p class="step-desc">Share a brief bio</p>
      <label for="bio">Bio</label>
      <textarea id="bio" placeholder="Tell us about yourself..."></textarea>
      <div class="btn-row">
        <button class="btn btn-back" onclick="goToStep(1)">Back</button>
        <button class="btn btn-next" onclick="goToStep(3)">Next</button>
      </div>
    </div>

    <!-- Step 4: Complete -->
    <div class="step" id="step3">
      <div class="completion">
        <div class="check">✓</div>
        <h2>All Set!</h2>
        <p class="step-desc">Your profile has been created successfully.</p>
        <button class="btn btn-next" onclick="goToStep(0)">Start Over</button>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 0;
    function goToStep(step) {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');
      document.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.classList.remove('active', 'done');
        if (i < step) dot.classList.add('done');
        else if (i === step) dot.classList.add('active');
      });
      currentStep = step;
    }
  </script>
</body>
</html>
