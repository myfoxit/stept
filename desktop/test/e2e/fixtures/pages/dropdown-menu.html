<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Menu - Selection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { width: 400px; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6e6e82; margin-bottom: 24px; }
    .dropdown-wrapper { position: relative; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .dropdown-trigger {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d4d4de; border-radius: 8px;
      background: #fff; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .dropdown-trigger:hover { border-color: #3ab08a; }
    .dropdown-trigger .arrow { transition: transform 0.2s; }
    .dropdown-trigger.open .arrow { transform: rotate(180deg); }
    .dropdown-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #fff; border: 1.5px solid #d4d4de; border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08); z-index: 10; overflow: hidden;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-item {
      padding: 10px 14px; font-size: 14px; cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; color: #1a1a2e;
    }
    .dropdown-item:hover { background: #f0faf6; }
    .dropdown-item.selected { background: #e6f9f0; color: #1a7a5a; font-weight: 600; }
    .selection-result { margin-top: 16px; padding: 12px; background: #e6f9f0; color: #1a7a5a; border-radius: 8px; font-weight: 500; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Preferences</h1>
    <p class="subtitle">Choose your settings</p>

    <div class="dropdown-wrapper">
      <label for="roleDropdown">Role</label>
      <div class="dropdown-trigger" id="roleDropdown" onclick="toggleDropdown('role')" role="combobox" aria-expanded="false">
        <span id="roleValue">Select a role...</span>
        <span class="arrow">▾</span>
      </div>
      <div class="dropdown-menu" id="roleMenu" role="listbox">
        <button class="dropdown-item" role="option" onclick="selectItem('role', 'Developer')">Developer</button>
        <button class="dropdown-item" role="option" onclick="selectItem('role', 'Designer')">Designer</button>
        <button class="dropdown-item" role="option" onclick="selectItem('role', 'Manager')">Manager</button>
        <button class="dropdown-item" role="option" onclick="selectItem('role', 'QA Engineer')">QA Engineer</button>
      </div>
    </div>

    <div class="dropdown-wrapper">
      <label for="themeDropdown">Theme</label>
      <div class="dropdown-trigger" id="themeDropdown" onclick="toggleDropdown('theme')" role="combobox" aria-expanded="false">
        <span id="themeValue">Select a theme...</span>
        <span class="arrow">▾</span>
      </div>
      <div class="dropdown-menu" id="themeMenu" role="listbox">
        <button class="dropdown-item" role="option" onclick="selectItem('theme', 'Light')">Light</button>
        <button class="dropdown-item" role="option" onclick="selectItem('theme', 'Dark')">Dark</button>
        <button class="dropdown-item" role="option" onclick="selectItem('theme', 'Auto')">Auto</button>
      </div>
    </div>

    <div class="selection-result" id="selectionResult"></div>
  </div>

  <script>
    const selections = {};
    function toggleDropdown(name) {
      const menu = document.getElementById(name + 'Menu');
      const trigger = document.getElementById(name + 'Dropdown');
      const isOpen = menu.classList.contains('open');
      // Close all
      document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
      document.querySelectorAll('.dropdown-trigger').forEach(t => t.classList.remove('open'));
      if (!isOpen) {
        menu.classList.add('open');
        trigger.classList.add('open');
      }
    }
    function selectItem(name, value) {
      selections[name] = value;
      document.getElementById(name + 'Value').textContent = value;
      document.getElementById(name + 'Menu').classList.remove('open');
      document.getElementById(name + 'Dropdown').classList.remove('open');
      // Mark selected
      document.querySelectorAll('#' + name + 'Menu .dropdown-item').forEach(item => {
        item.classList.toggle('selected', item.textContent === value);
      });
      updateResult();
    }
    function updateResult() {
      const parts = [];
      if (selections.role) parts.push('Role: ' + selections.role);
      if (selections.theme) parts.push('Theme: ' + selections.theme);
      if (parts.length > 0) {
        const el = document.getElementById('selectionResult');
        el.textContent = parts.join(' | ');
        el.style.display = 'block';
      }
    }
    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown-wrapper')) {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.dropdown-trigger').forEach(t => t.classList.remove('open'));
      }
    });
  </script>
</body>
</html>
