<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Form - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 12px; padding: 32px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
    .subtitle { font-size: 14px; color: #6e6e82; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d4d4de; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color 0.15s; margin-bottom: 16px;
    }
    input:focus { border-color: #3ab08a; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .checkbox-row input { width: 16px; height: 16px; }
    .checkbox-row label { margin-bottom: 0; font-weight: 400; color: #6e6e82; }
    button {
      width: 100%; padding: 12px; background: #3ab08a; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #2f9a78; }
    .footer-link { text-align: center; margin-top: 16px; font-size: 13px; }
    .footer-link a { color: #3ab08a; text-decoration: none; }
    .success-msg { display: none; padding: 12px; background: #e6f9f0; color: #1a7a5a; border-radius: 8px; margin-top: 16px; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>
    <form id="loginForm" onsubmit="handleSubmit(event)">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" placeholder="you@example.com" autocomplete="off">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="off">
      <div class="checkbox-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" id="loginBtn">Sign In</button>
    </form>
    <div class="footer-link">
      <a href="#" id="forgotLink">Forgot password?</a>
    </div>
    <div class="success-msg" id="successMsg">Login successful! Redirecting...</div>
  </div>
  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
