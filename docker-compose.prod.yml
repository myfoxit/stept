services:
  caddy:
    image: caddy:2-alpine
    container_name: ondoki-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ondoki-network
    depends_on:
      - frontend
      - backend

  db:
    image: pgvector/pgvector:pg16
    container_name: ondoki-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ondoki}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ondoki-network

  redis:
    image: redis:7-alpine
    container_name: ondoki-redis
    restart: unless-stopped
    networks:
      - ondoki-network

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ondoki-gotenberg
    restart: unless-stopped
    environment:
      - GOTENBERG_API_TIMEOUT=300s
      - GOTENBERG_CHROMIUM_ALLOW_FILE_ACCESS_FROM_FILES=true
    networks:
      - ondoki-network

  backend:
    image: ghcr.io/myfoxit/ondoki-web-api:latest
    container_name: ondoki-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://redis:6379/0
      GOTENBERG_URL: http://gotenberg:3000
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET}
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY}
    volumes:
      - file-storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ondoki-network

  frontend:
    image: ghcr.io/myfoxit/ondoki-web-app:latest
    container_name: ondoki-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ondoki-network

volumes:
  db-data:
  caddy-data:
  caddy-config:
  file-storage:

networks:
  ondoki-network:
    driver: bridge
