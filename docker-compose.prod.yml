services:
  caddy:
    image: caddy:2-alpine
    container_name: ondoki-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - stept-network
    depends_on:
      - frontend
      - backend

  db:
    image: pgvector/pgvector:pg16
    container_name: stept-db
    restart: unless-stopped
    # No exposed ports in production — only accessible within Docker network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-stept}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stept-network

  redis:
    image: redis:7-alpine
    container_name: stept-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - stept-network

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: stept-gotenberg
    restart: unless-stopped
    environment:
      - GOTENBERG_API_TIMEOUT=300s
      - GOTENBERG_CHROMIUM_ALLOW_FILE_ACCESS_FROM_FILES=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - stept-network

  backend:
    image: ghcr.io/myfoxit/stept-api:latest
    container_name: stept-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stept}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      GOTENBERG_URL: http://gotenberg:3000
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET}
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      SENDCLOAK_ENABLED: "${SENDCLOAK_ENABLED:-false}"
      SENDCLOAK_URL: "${SENDCLOAK_URL:-http://sendcloak:9090}"
      SR_SMTP_HOST: ${SR_SMTP_HOST:-}
      SR_SMTP_PORT: ${SR_SMTP_PORT:-587}
      SR_SMTP_USER: ${SR_SMTP_USER:-}
      SR_SMTP_PASS: ${SR_SMTP_PASS:-}
      SR_FROM_EMAIL: ${SR_FROM_EMAIL:-noreply@stept.ai}
      # Storage
      STORAGE_BACKEND: "${STORAGE_BACKEND:-local}"
      LOCAL_STORAGE_PATH: "${LOCAL_STORAGE_PATH:-/app/storage/recordings}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_PREFIX: "${S3_PREFIX:-uploads}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    volumes:
      - file-storage:/app/storage
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - stept-network

  media-worker:
    image: ghcr.io/myfoxit/stept-media-worker:latest
    container_name: stept-media-worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --queues=celery,media --concurrency=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stept}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      ONDOKI_UPLOAD_DIR: /app/storage/videos
      STORAGE_BACKEND: "${STORAGE_BACKEND:-local}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_PREFIX: "${S3_PREFIX:-uploads}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    volumes:
      - file-storage:/app/storage
    networks:
      - stept-network

  frontend:
    image: ghcr.io/myfoxit/stept-app:latest
    container_name: stept-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - stept-network

  # ── SendCloak — PII obfuscation (optional) ──────────────────────────
  # Enable: docker compose --profile privacy -f docker-compose.prod.yml up -d
  sendcloak:
    image: ghcr.io/myfoxit/sendcloak:latest
    container_name: stept-sendcloak
    profiles: ["privacy"]
    command: ["api", "--port", "9090", "--bind", "0.0.0.0"]
    environment:
      SENDCLOAK_STRATEGY: "${SENDCLOAK_STRATEGY:-semantic}"
      SENDCLOAK_LOG_LEVEL: info
      SENDCLOAK_PRESIDIO_URL: "http://presidio:3000"
    networks:
      - stept-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: stept-presidio
    profiles: ["presidio"]
    environment:
      DEFAULT_LANGUAGE: "${PRESIDIO_LANGUAGE:-en}"
    networks:
      - stept-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  caddy-data:
  caddy-config:
  file-storage:
  uploads:

networks:
  stept-network:
    driver: bridge
