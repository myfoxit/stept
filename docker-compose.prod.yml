services:
  caddy:
    image: caddy:2-alpine
    container_name: ondoki-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ondoki-network
    depends_on:
      - frontend
      - backend

  db:
    image: pgvector/pgvector:pg16
    container_name: ondoki-db
    restart: unless-stopped
    # No exposed ports in production — only accessible within Docker network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ondoki}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ondoki-network

  redis:
    image: redis:7-alpine
    container_name: ondoki-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ondoki-network

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ondoki-gotenberg
    restart: unless-stopped
    environment:
      - GOTENBERG_API_TIMEOUT=300s
      - GOTENBERG_CHROMIUM_ALLOW_FILE_ACCESS_FROM_FILES=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ondoki-network

  backend:
    image: ghcr.io/myfoxit/ondoki-web-api:latest
    container_name: ondoki-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      GOTENBERG_URL: http://gotenberg:3000
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET}
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      SENDCLOAK_ENABLED: "${SENDCLOAK_ENABLED:-false}"
      SENDCLOAK_URL: "${SENDCLOAK_URL:-http://sendcloak:9090}"
      SR_SMTP_HOST: ${SR_SMTP_HOST:-}
      SR_SMTP_PORT: ${SR_SMTP_PORT:-587}
      SR_SMTP_USER: ${SR_SMTP_USER:-}
      SR_SMTP_PASS: ${SR_SMTP_PASS:-}
      SR_FROM_EMAIL: ${SR_FROM_EMAIL:-noreply@ondoki.com}
    volumes:
      - file-storage:/app/storage
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ondoki-network

  media-worker:
    image: ghcr.io/myfoxit/ondoki-web-media-worker:latest
    container_name: ondoki-media-worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --queues=celery,media --concurrency=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      ONDOKI_UPLOAD_DIR: /app/storage/videos
    volumes:
      - file-storage:/app/storage
    networks:
      - ondoki-network

  frontend:
    image: ghcr.io/myfoxit/ondoki-web-app:latest
    container_name: ondoki-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ondoki-network

volumes:
  db-data:
  caddy-data:
  caddy-config:
  file-storage:
  uploads:

networks:
  ondoki-network:
    driver: bridge
