name: CI Extension

on:
  push:
    branches: [master]
    paths: ['extension/**', 'packages/**', '.github/workflows/ci-extension.yml']
  pull_request:
    branches: [master]
    paths: ['extension/**', 'packages/**', '.github/workflows/ci-extension.yml']

jobs:
  build-extension:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build extension
        working-directory: extension
        run: |
          if [ -f build.sh ]; then bash build.sh; fi
      - name: Package extension
        run: |
          cd extension
          zip -r ../stept-extension.zip . \
            -x "*.md" "dist-*/*" ".git*" "TASK.md" "FIX-TASK.md" \
            "REVIEW-*.md" "ISSUES.md" "SCRIBE-*.md" "ONDOKI-*.md"
      - uses: actions/upload-artifact@v4
        with:
          name: stept-chrome-extension
          path: stept-extension.zip
          retention-days: 30
