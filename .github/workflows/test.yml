name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # ── Unit + screenshot pixel tests (no native binary needed) ──
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Coverage report
        if: always()
        run: npx vitest run --coverage --reporter=verbose 2>&1 | tail -30

  # ── Native binary contract tests (per-platform) ──
  native-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: brew install jq || true
      - name: Build native binary
        run: |
          cd native/macos
          swiftc -framework Cocoa -framework ApplicationServices \
            -o window-info window-info.swift
      - name: Run contract tests
        run: bash test/native/contract-test.sh macos

  native-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install jq
        run: choco install jq -y
      - name: Build native binary
        run: |
          cd native/windows
          dotnet publish -c Release -r win-x64 --self-contained
      - name: Run contract tests
        shell: bash
        run: bash test/native/contract-test.sh windows

  # ── TypeScript compilation check ──
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc -p tsconfig.main.json --noEmit
