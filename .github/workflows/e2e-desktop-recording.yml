name: E2E Desktop Tests

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        # No Linux — Electron desktop recording needs a GUI session

    runs-on:
  workflow_dispatch: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version:
  workflow_dispatch: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Playwright
        working-directory: desktop
        run: npx playwright install --with-deps chromium

      - name: Build Electron app
        working-directory: desktop
        run: npm run build

      - name: Compile native binary (macOS)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: |
          if [ -f native/macos/window-info.swift ]; then
            swiftc -O -o native/macos/window-info native/macos/window-info.swift \
              -framework AppKit -framework CoreGraphics -framework ApplicationServices || true
          fi

      - name: Compile native binary (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop
        run: |
          if (Test-Path native/windows/window-info.csproj) {
            dotnet publish native/windows -c Release -r win-x64 --self-contained 2>$null
          }
        shell: pwsh
        continue-on-error: true

      - name: Run E2E tests
        working-directory: desktop
        run: npm run test:e2e
        env:
          ELECTRON_DISABLE_SECURITY_WARNINGS: '1'
          NODE_ENV: test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: |
            desktop/test-results/
            desktop/playwright-report/
          retention-days: 7
