name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      media_worker:
        description: "Deploy media worker (video-to-guide, Whisper)"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/myfoxit/stept-web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend (API)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          tags: |
            ${{ env.IMAGE_PREFIX }}-app:latest
            ${{ env.IMAGE_PREFIX }}-app:${{ steps.version.outputs.tag }}

      - name: Build and push media worker
        if: inputs.media_worker != false
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./video-worker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=media
          cache-to: type=gha,mode=max,scope=media
          tags: |
            ${{ env.IMAGE_PREFIX }}-media-worker:latest
            ${{ env.IMAGE_PREFIX }}-media-worker:${{ steps.version.outputs.tag }}

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy production files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_PATH || '/opt/stept' }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.tag }}
          ENABLE_MEDIA_WORKER: ${{ inputs.media_worker != false && 'true' || 'false' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,ENABLE_MEDIA_WORKER
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH || '/opt/stept' }}"
            cd "$DEPLOY_DIR"

            echo "=== Deploying $IMAGE_TAG (media_worker=$ENABLE_MEDIA_WORKER) ==="

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # Write .env on first deploy only — afterwards you edit it on the server directly
            if [ ! -f .env ]; then
              echo "First deploy — writing .env from secrets"
              cat > .env << 'ENVEOF'
            DOMAIN=${{ secrets.DOMAIN }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=stept
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ONDOKI_ENCRYPTION_KEY=${{ secrets.ONDOKI_ENCRYPTION_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            WHISPER_MODEL=base
            SR_SMTP_HOST=${{ secrets.SR_SMTP_HOST }}
            SR_SMTP_PORT=${{ secrets.SR_SMTP_PORT }}
            SR_SMTP_USER=${{ secrets.SR_SMTP_USER }}
            SR_SMTP_PASS=${{ secrets.SR_SMTP_PASS }}
            SR_FROM_EMAIL=${{ secrets.SR_FROM_EMAIL }}
            ENVEOF
            fi

            # Pull images
            docker compose -f docker-compose.prod.yml pull backend frontend
            if [ "$ENABLE_MEDIA_WORKER" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull media-worker
            fi

            # Stop media worker if disabled
            if [ "$ENABLE_MEDIA_WORKER" = "false" ]; then
              docker compose -f docker-compose.prod.yml stop media-worker 2>/dev/null || true
              docker compose -f docker-compose.prod.yml rm -f media-worker 2>/dev/null || true
            fi

            # Bring up services
            if [ "$ENABLE_MEDIA_WORKER" = "true" ]; then
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
            else
              docker compose -f docker-compose.prod.yml up -d --remove-orphans --scale media-worker=0
            fi

            # Wait for backend health
            echo "Waiting for backend..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null; then
                echo "Backend healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Backend did not become healthy"
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              sleep 3
            done

            # Run database migrations
            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

            # Wait for Caddy TLS
            echo "Checking HTTPS..."
            for i in $(seq 1 15); do
              if curl -sf "https://${DOMAIN:-localhost}" -o /dev/null 2>&1; then
                echo "HTTPS live!"
                break
              fi
              sleep 4
            done

            # Cleanup
            docker image prune -f

            echo "=== Deploy complete: $(date) ==="
            docker compose -f docker-compose.prod.yml ps
