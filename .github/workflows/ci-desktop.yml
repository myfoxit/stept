name: CI Desktop

on:
  push:
    branches: [master]
    paths: ['desktop/**', 'packages/**', '.github/workflows/ci-desktop.yml']
  pull_request:
    branches: [master]
    paths: ['desktop/**', 'packages/**', '.github/workflows/ci-desktop.yml']

jobs:
  test-desktop:
    name: Desktop Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: desktop
      - run: npm run build
        working-directory: desktop
      - run: npm test
        working-directory: desktop

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test-desktop]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: desktop
      - run: npm run make
        working-directory: desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: desktop/out/make/**/*
          retention-days: 30
