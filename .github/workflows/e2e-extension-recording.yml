name: E2E Recording Tests

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on:
  workflow_dispatch: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version:
  workflow_dispatch: '20'

      - name: Install dependencies
        working-directory: extension/tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: extension/tests
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        working-directory: extension/tests
        run: npx playwright install-deps chromium

      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        working-directory: extension/tests
        run: xvfb-run --auto-servernum npx playwright test --config=e2e/playwright.config.ts

      - name: Run E2E tests (macOS / Windows)
        if: runner.os != 'Linux'
        working-directory: extension/tests
        run: npx playwright test --config=e2e/playwright.config.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: |
            extension/tests/test-results/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: extension/extension/tests/test-results/html/
          retention-days: 30
