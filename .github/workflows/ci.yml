name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stept_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        working-directory: api
        run: ruff check . --exit-zero

      - name: Run tests
        working-directory: api
        run: python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL_TEST: postgresql+asyncpg://postgres:postgres@localhost:5432/stept_test
          JWT_SECRET: ci-test-secret
          STEPT_ENCRYPTION_KEY: ci-test-key-must-be-32-bytes-pad
          ENVIRONMENT: test

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: app
        run: npx tsc --noEmit || true

      - name: Run tests
        working-directory: app
        run: npx jest --passWithNoTests

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

  docker-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ghcr.io/myfoxit/stept-api:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/myfoxit/stept-app:latest
