<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ondoki Process Recorder</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
       <svg
                  style={{ width: "38px", height: "36px" }}
                  width="38"
                  height="36"
                  viewBox="0 0 38 36"
                >
                  <rect
                    x="0"
                    y="4"
                    width="32"
                    height="32"
                    rx="9"
                    fill="#3AB08A"
                  />
                  <rect
                    x="7"
                    y="11"
                    width="10"
                    height="3.5"
                    rx="1.75"
                    fill="white"
                  />
                  <rect
                    x="7"
                    y="17.5"
                    width="18"
                    height="3.5"
                    rx="1.75"
                    fill="white"
                  />
                  <rect
                    x="7"
                    y="24"
                    width="14"
                    height="3.5"
                    rx="1.75"
                    fill="white"
                  />
                  <path
                    d="M33 0 L34.5 4.5 L38 6 L34.5 7.5 L33 12 L31.5 7.5 L28 6 L31.5 4.5 Z"
                    fill="#3AB08A"
                  />
                </svg>
    </div>

    <!-- Login Panel -->
    <div id="loginPanel" class="panel" style="align-items: center;">
      <button id="loginBtn" class="btn btn-outline">
        Sign In
      </button>
      <!-- MISS-C006: Inline error message for login/API failures -->
      <div id="loginError" class="inline-error hidden"></div>
      <p class="version">version 1.0.1</p>
    </div>

    <!-- User Panel (authenticated) -->
    <div id="userPanel" class="panel hidden">
      <!-- Greeting -->
      <p id="greeting" class="greeting">Hello!</p>

      <!-- Idle State — Start button first for visibility -->
      <div id="idlePanel">
        <button id="startBtn" class="btn btn-primary" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
          </svg>
          Start Capture
        </button>
      </div>

      <!-- Project Selector -->
      <label class="select-label">Project</label>
      <select id="projectSelector" class="select">
        <option value="">Select project</option>
      </select>

      <!-- Settings -->
      <details class="settings-details">
        <summary class="settings-toggle">⚙ Settings</summary>
        <div class="settings-content">
          <label class="settings-label">Display Mode</label>
          <div class="mode-selector">
            <button id="modeSidePanel" class="mode-btn" data-mode="sidepanel">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="15" y1="3" x2="15" y2="21"/>
              </svg>
              Side Panel
            </button>
            <button id="modeDock" class="mode-btn" data-mode="dock">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="6" width="6" height="12" rx="1"/>
                <rect x="10" y="3" width="12" height="18" rx="2" stroke-dasharray="3 3"/>
              </svg>
              Dock
            </button>
          </div>
          <div id="apiUrlSection">
            <label class="settings-label" for="apiUrlInput">API URL</label>
            <input id="apiUrlInput" class="settings-input" type="url" placeholder="https://app.ondoki.com/api/v1">
            <button id="saveSettingsBtn" class="btn btn-outline btn-sm">Save</button>

            <label class="settings-label" for="frontendUrlInput" style="margin-top: 8px;">Frontend URL</label>
            <input id="frontendUrlInput" class="settings-input" type="url" placeholder="http://localhost:5173">
            <button id="saveFrontendBtn" class="btn btn-outline btn-sm">Save</button>
          </div>
        </div>
      </details>

      <!-- Recording State -->
      <div id="recordingPanel" class="hidden">
        <!-- Status -->
        <div class="status">
          <div id="recordingIndicator" class="recording-dot"></div>
          <span id="statusText">Capturing...</span>
        </div>

        <!-- Step count -->
        <p id="stepCount" class="step-count">0 steps recorded</p>

        <!-- Recording time -->
        <p id="recordingTime" class="recording-time">00:00</p>

        <!-- Control buttons -->
        <div class="btn-group">
          <button id="pauseBtn" class="btn btn-outline btn-sm">
            <svg id="pauseIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
            <span id="pauseText">Pause</span>
          </button>
          <button id="deleteBtn" class="btn btn-outline btn-sm btn-danger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Delete
          </button>
        </div>

        <!-- Complete button -->
        <button id="completeBtn" class="btn btn-complete">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Complete Capture
        </button>
      </div>

      <!-- Preview Panel -->
      <div id="previewPanel" class="hidden">
        <h3>Capture Preview</h3>
        <div id="stepsContainer" class="steps-container"></div>
        <div class="btn-group">
          <button id="closePreviewBtn" class="btn btn-outline">Close</button>
          <button id="uploadBtn" class="btn btn-primary">Upload</button>
        </div>
      </div>

      <!-- Upload Progress -->
      <div id="uploadPanel" class="hidden">
        <h3>Uploading...</h3>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="uploadStatus">Preparing upload...</p>
      </div>

      <!-- Logout -->
      <button id="logoutBtn" class="btn btn-outline btn-sm logout-btn">
        Sign Out
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
