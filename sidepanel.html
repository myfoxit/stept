<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ondoki - Recording Steps</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
         <svg
                  style={{ width: "38px", height: "36px" }}
                  width="38"
                  height="36"
                  viewBox="0 0 38 36"
                >
                  <rect
                    x="0"
                    y="4"
                    width="32"
                    height="32"
                    rx="9"
                    fill="#3AB08A"
                  />
                  <rect
                    x="7"
                    y="11"
                    width="10"
                    height="3.5"
                    rx="1.75"
                    fill="white"
                  />
                  <rect
                    x="7"
                    y="17.5"
                    width="18"
                    height="3.5"
                    rx="1.75"
                    fill="white"
                  />
                  <rect
                    x="7"
                    y="24"
                    width="14"
                    height="3.5"
                    rx="1.75"
                    fill="white"
                  />
                  <path
                    d="M33 0 L34.5 4.5 L38 6 L34.5 7.5 L33 12 L31.5 7.5 L28 6 L31.5 4.5 Z"
                    fill="#3AB08A"
                  />
                </svg>
        <h1>Ondoki</h1>
      </div>
      <div class="recording-badge" id="recordingBadge">
        <span class="recording-dot"></span>
        <span id="recordingStatus">Recording</span>
        <span class="badge-step-count" id="badgeStepCount"></span>
      </div>
    </header>

    <!-- Duration (small, in a sub-header row) -->
    <div class="duration-bar">
      <span class="duration-label" id="recordingTime">00:00</span>
    </div>

    <!-- Login Panel (shown in side panel mode when not authenticated) -->
    <div id="spLoginPanel" class="sp-auth-panel hidden">
      <div class="sp-auth-content">
        <p class="sp-welcome">Welcome to Ondoki</p>
        <p class="sp-subtitle">Sign in to start recording processes</p>
        <button id="spLoginBtn" class="btn btn-primary">Sign In</button>
        <div id="spLoginError" class="sp-error hidden"></div>
      </div>
    </div>

    <!-- Setup Panel (authenticated but not recording) -->
    <div id="spSetupPanel" class="sp-auth-panel hidden">
      <div class="sp-auth-content">
        <p id="spGreeting" class="sp-welcome">Hello!</p>
        <select id="spProjectSelector" class="sp-select">
          <option value="">Select project</option>
        </select>
        <button id="spStartBtn" class="btn btn-primary" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start Capture
        </button>
        <button id="spLogoutBtn" class="btn btn-outline btn-sm" style="margin-top:12px; width:auto; padding:8px 24px;">Sign Out</button>
      </div>
    </div>

    <!-- Steps list -->
    <div class="steps-list" id="stepsList">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A8A29E" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <p>Waiting for actions...</p>
        <span>Click or type on the page to record steps</span>
      </div>
    </div>

    <!-- Upload Panel (shown after completing) -->
    <div class="upload-panel hidden" id="uploadPanel">
      <div class="upload-content">
        <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3ab08a" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3 id="uploadTitle">Ready to Upload</h3>
        <p id="uploadMessage"><span id="uploadStepCount">0</span> steps captured</p>
        <div class="progress-bar hidden" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="upload-status" id="uploadStatus"></p>
      </div>
      <div class="upload-actions" id="uploadActions">
        <button id="backBtn" class="btn btn-outline">Back</button>
        <button id="uploadBtn" class="btn btn-primary">Upload to Cloud</button>
      </div>
      <div class="upload-actions hidden" id="uploadDoneActions">
        <button id="newCaptureBtn" class="btn btn-primary">New Capture</button>
      </div>
    </div>

    <!-- Footer controls - Scribe-like bottom toolbar -->
    <footer class="footer" id="footer">
      <div class="footer-left">
        <button id="pauseBtn" class="footer-icon-btn" title="Pause">
          <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button id="deleteAllBtn" class="footer-icon-btn" title="Delete capture">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <button id="completeBtn" class="complete-bar-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Complete Capture
      </button>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
