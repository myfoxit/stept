<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ondoki - Recording Steps</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg width="28" height="22" viewBox="0 0 38 30" fill="none">
          <rect y="2" width="13" height="5" rx="2.5" fill="#3ab08a"/>
          <rect y="12" width="22" height="5" rx="2.5" fill="#3ab08a"/>
          <rect y="22" width="17" height="5" rx="2.5" fill="#3ab08a"/>
          <path d="M32 0 L33.8 5.6 L38 7.5 L33.8 9.4 L32 15 L30.2 9.4 L26 7.5 L30.2 5.6 Z" fill="#3ab08a"/>
        </svg>
        <h1>Ondoki</h1>
      </div>
      <div class="recording-badge" id="recordingBadge">
        <span class="recording-dot"></span>
        <span id="recordingStatus">Recording</span>
        <span class="badge-step-count" id="badgeStepCount"></span>
      </div>
    </header>

    <!-- Duration (small, in a sub-header row) -->
    <div class="duration-bar">
      <span class="duration-label" id="recordingTime">00:00</span>
    </div>

    <!-- Steps list -->
    <div class="steps-list" id="stepsList">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A8A29E" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <p>Waiting for actions...</p>
        <span>Click or type on the page to record steps</span>
      </div>
    </div>

    <!-- Upload Panel (shown after completing) -->
    <div class="upload-panel hidden" id="uploadPanel">
      <div class="upload-content">
        <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3ab08a" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3 id="uploadTitle">Ready to Upload</h3>
        <p id="uploadMessage"><span id="uploadStepCount">0</span> steps captured</p>
        <div class="progress-bar hidden" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="upload-status" id="uploadStatus"></p>
      </div>
      <div class="upload-actions" id="uploadActions">
        <button id="backBtn" class="btn btn-outline">Back</button>
        <button id="uploadBtn" class="btn btn-primary">Upload to Cloud</button>
      </div>
      <div class="upload-actions hidden" id="uploadDoneActions">
        <button id="newCaptureBtn" class="btn btn-primary">New Capture</button>
      </div>
    </div>

    <!-- Footer controls - Scribe-like bottom toolbar -->
    <footer class="footer" id="footer">
      <div class="footer-left">
        <button id="pauseBtn" class="footer-icon-btn" title="Pause">
          <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button id="deleteAllBtn" class="footer-icon-btn" title="Delete capture">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <button id="completeBtn" class="complete-bar-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Complete Capture
      </button>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
