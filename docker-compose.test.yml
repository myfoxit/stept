# docker-compose.test.yml — E2E test overlay
#
# Runs a separate backend on port 8001 connected to the ondoki_test database.
# NEVER shares a database with the dev/production backend.
#
# Usage: make test-e2e (handles everything automatically)
services:
  test-backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/app
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ondoki}:${POSTGRES_PASSWORD:-postgres}@db:5432/ondoki_test
      ENVIRONMENT: test
      JWT_SECRET: ${JWT_SECRET:-test-secret-for-e2e-only}
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY:-test-key-for-testing-only-32bytes}
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis
    networks:
      - ondoki-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
