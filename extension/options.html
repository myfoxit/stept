<!DOCTYPE html>
<html>
<head>
  <style>
    body { max-width: 400px; margin: 40px auto; font-family: -apple-system, sans-serif; }
    h2 { font-size: 18px; }
    label { display: block; margin-top: 12px; font-size: 13px; font-weight: 500; }
    input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 16px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #4f46e5; }
    .saved { color: #059669; font-size: 12px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h2>⚙ Ondoki Context Settings</h2>
  <label>API URL<input id="apiUrl" placeholder="https://your-ondoki-api.com"></label>
  <label>App URL<input id="appUrl" placeholder="https://your-ondoki-app.com"></label>
  <label>Auth Token<input id="authToken" type="password" placeholder="JWT token from Ondoki"></label>
  <label>Default Project ID<input id="projectId" placeholder="project ID"></label>
  <button id="save">Save</button>
  <div class="saved" id="saved">✓ Saved!</div>
  <script src="options.js"></script>
</body>
</html>
