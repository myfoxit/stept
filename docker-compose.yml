services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ondoki-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ondoki}
    ports:             
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ondoki-network


  redis:
    image: redis:7-alpine
    container_name: ondoki-redis
    restart: unless-stopped
    networks:
      - ondoki-network

 
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ondoki-gotenberg
    restart: unless-stopped
    environment:
      - GOTENBERG_API_TIMEOUT=300s
      - GOTENBERG_CHROMIUM_ALLOW_FILE_ACCESS_FROM_FILES=true
    networks:
      - ondoki-network


  backend:
    build: ./api
    container_name: ondoki-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
    
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://redis:6379/0
      GOTENBERG_URL: http://gotenberg:3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ENVIRONMENT: production
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY:?ONDOKI_ENCRYPTION_KEY must be set}
      SENDCLOAK_ENABLED: "${SENDCLOAK_ENABLED:-false}"
      SENDCLOAK_URL: "${SENDCLOAK_URL:-http://sendcloak:9090}"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Storage
      STORAGE_BACKEND: "${STORAGE_BACKEND:-local}"
      LOCAL_STORAGE_PATH: "${LOCAL_STORAGE_PATH:-/app/storage/recordings}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_PREFIX: "${S3_PREFIX:-uploads}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ondoki-network



  frontend:
    build: ./app
    container_name: ondoki-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80" 
    networks:
      - ondoki-network

  # ── SendCloak — PII obfuscation for AI requests (optional) ──────────
  # Enable:  docker compose --profile privacy up -d
  # Works standalone (regex + built-in detection) or with Presidio for
  # enhanced name/org detection:
  #   docker compose --profile privacy --profile presidio up -d
  sendcloak:
    image: ghcr.io/myfoxit/dataveil:latest
    container_name: ondoki-sendcloak
    profiles: ["privacy"]
    command: ["api", "--port", "9090", "--bind", "0.0.0.0"]
    environment:
      SENDCLOAK_STRATEGY: "${SENDCLOAK_STRATEGY:-semantic}"
      SENDCLOAK_LOG_LEVEL: info
      # Point to Presidio if running; SendCloak gracefully degrades without it
      SENDCLOAK_PRESIDIO_URL: "http://presidio:3000"
    ports:
      - "9090:9090"
    volumes:
      - sendcloak-data:/root/.sendcloak
    depends_on:
      presidio:
        condition: service_started
        required: false
    networks:
      - ondoki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Presidio — Microsoft NER-based PII detection (optional) ────────
  # Enable:  docker compose --profile privacy --profile presidio up -d
  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: ondoki-presidio
    profiles: ["presidio"]
    environment:
      DEFAULT_LANGUAGE: "${PRESIDIO_LANGUAGE:-en}"
    ports:
      - "5002:3000"
    networks:
      - ondoki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5


volumes:
  db-data:
  sendcloak-data:

networks:
  ondoki-network:
    driver: bridge
