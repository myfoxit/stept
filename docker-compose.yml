services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ondoki-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ondoki}
    ports:             
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ondoki-network


  redis:
    image: redis:7-alpine
    container_name: ondoki-redis
    restart: unless-stopped
    networks:
      - ondoki-network

 
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ondoki-gotenberg
    restart: unless-stopped
    environment:
      - GOTENBERG_API_TIMEOUT=300s
      - GOTENBERG_CHROMIUM_ALLOW_FILE_ACCESS_FROM_FILES=true
    networks:
      - ondoki-network


  backend:
    build: ./api
    container_name: ondoki-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
    
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://redis:6379/0
      GOTENBERG_URL: http://gotenberg:3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ENVIRONMENT: production
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY:?ONDOKI_ENCRYPTION_KEY must be set}
      SENDCLOAK_ENABLED: "${SENDCLOAK_ENABLED:-false}"
      SENDCLOAK_URL: "${SENDCLOAK_URL:-http://sendcloak:9090}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ondoki-network


  celery-worker:
    build: ./api
    container_name: ondoki-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY:?ONDOKI_ENCRYPTION_KEY must be set}
    networks:
      - ondoki-network


  frontend:
    build: ./app
    container_name: ondoki-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80" 
    networks:
      - ondoki-network

  sendcloak:
    image: ghcr.io/myfoxit/sendcloak:latest
    profiles: ["privacy"]
    command: ["api", "--port", "9090", "--bind", "0.0.0.0", "--config", "/data/config.yaml"]
    environment:
      SENDCLOAK_CONFIG: /data/config.yaml
      SENDCLOAK_STRATEGY: "${SENDCLOAK_STRATEGY:-semantic}"
      SENDCLOAK_LOG_LEVEL: info
    ports:
      - "9090:9090"
    volumes:
      - sendcloak-data:/root/.sendcloak
      - ./sendcloak-config.yaml:/data/config.yaml:ro
    depends_on:
      presidio:
        condition: service_started
    networks:
      - ondoki-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  presidio:
    build:
      context: .
      dockerfile: presidio/Dockerfile
      args:
        PRESIDIO_LANG_PACK: "${PRESIDIO_LANG_PACK:-en}"
    image: "ondoki-presidio:${PRESIDIO_LANG_PACK:-en}"
    container_name: ondoki-presidio
    profiles: ["privacy"]
    environment:
      DEFAULT_LANGUAGE: "${PRESIDIO_LANGUAGE:-en}"
      NLP_CONF_FILE: "/app/presidio_nlp_${PRESIDIO_LANG_PACK:-en}.yaml"
    ports:
      - "5002:3000"
    networks:
      - ondoki-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  video-worker:
    build:
      context: .
      dockerfile: video-worker/Dockerfile
    container_name: ondoki-video-worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --queues=video --concurrency=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ondoki}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY:?ONDOKI_ENCRYPTION_KEY must be set}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - video-uploads:/data/uploads/videos
    profiles:
      - video
    networks:
      - ondoki-network

volumes:
  db-data:
  video-uploads:
  sendcloak-data:

networks:
  ondoki-network:
    driver: bridge
