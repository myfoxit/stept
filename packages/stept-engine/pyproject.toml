[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stept"
version = "0.1.0"
description = "Browser automation with memory. Record once, replay forever."
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "playwright>=1.40",
    "pydantic>=2.0",
    "httpx>=0.25",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]

[project.scripts]
stept = "stept.cli:main"