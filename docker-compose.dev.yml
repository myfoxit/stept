# Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    # Expose DB port for local development tools (pgAdmin, DBeaver, etc.)
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-include '*.py'
    volumes:
      - ./api:/app
      - recordings-storage:/app/storage/recordings
    environment:
      ENVIRONMENT: local
      GOTENBERG_URL: http://gotenberg:3000
      LOCAL_STORAGE_PATH: /app/storage/recordings
      WATCHFILES_FORCE_POLLING: "false"
      ONDOKI_ENCRYPTION_KEY: ${ONDOKI_ENCRYPTION_KEY:-exX5o2vhMgT48Eho4ShGcD-vx_iKKZQMBGgOfw7dhRM=}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      - gotenberg

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: builder 
   
    command: pnpm dev --host 0.0.0.0
    volumes:
      - ./app:/app
      - /app/node_modules 
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      API_URL: http://localhost:8000/api/v1
      VITE_API_BASE_URL: http://localhost:8000/api/v1

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3000:3000"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=120s"

volumes:
  recordings-storage:
